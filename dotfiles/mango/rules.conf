# Window & Layer Rules

# Floating kitty — copot tanda # kalo mau (launch: kitty -T floating-kitty)
# windowrule=isfloating:1,width:900,height:600,title:floating-kitty

# Semua kitty window jadi floating (copot tanda # kalo mau)
# windowrule=isfloating:1,width:900,height:600,appid:kitty

# Steam — floating + idle inhibit
windowrule=isfloating:1,width:1200,height:800,appid:steam
windowrule=indleinhibit_when_focus:1,appid:steam

# LocalSend — floating
windowrule=isfloating:1,width:800,height:600,title:LocalSend
windowrule=isfloating:1,width:800,height:600,appid:localsend
windowrule=isfloating:1,width:800,height:600,appid:org.localsend.localsend

# Kalkulator — floating
windowrule=isfloating:1,width:400,height:500,appid:org.gnome.Calculator
windowrule=isfloating:1,width:400,height:500,appid:kcalc

# Pavucontrol — floating (appid bisa beda tergantung cara launch)
windowrule=isfloating:1,width:800,height:600,appid:org.pulseaudio.pavucontrol
windowrule=isfloating:1,width:800,height:600,appid:pavucontrol

# Flameshot — floating
windowrule=isfloating:1,width:900,height:600,appid:org.flameshot.Flameshot

# Btop — floating (launch: kitty -T btop -e btop)
windowrule=isfloating:1,width:1200,height:700,title:btop

# IMV — floating (image viewer)
windowrule=isfloating:1,width:900,height:700,appid:imv

# MPV — floating
windowrule=isfloating:1,width:900,height:600,appid:mpv

# Shelly — floating
windowrule=isfloating:1,width:900,height:700,appid:com.shellyorg.shelly

# Webapp Manager — floating
windowrule=isfloating:1,width:1000,height:750,appid:webapp-manager

# File picker dialog — floating
# windowrule=isfloating:1,width:800,height:600,appid:org.freedesktop.impl.portal.desktop.gtk
