# Key Bindings — Omarchy Standard
# ============================================
# key name: refer to `wev` output
# mod keys: super, ctrl, alt, shift, none
# ============================================

# ═══════════════════════════════════════════
# Mango WM — Core
# ═══════════════════════════════════════════
bind = SUPER, r, reload_config
bind = SUPER, q, killclient
bind = SUPER, m, quit
bind = SUPER, escape, spawn, qs -c noctalia-shell ipc call sessionMenu toggle
bind = SUPER, space, spawn, qs -c noctalia-shell ipc call launcher toggle
bind = SUPER + CTRL, space, spawn, qs -c noctalia-shell ipc call wallpaper toggle

# ═══════════════════════════════════════════
# Launcher & Apps
# ═══════════════════════════════════════════
bind = SUPER, Return, spawn, alacritty

# ═══════════════════════════════════════════
# Noctalia — System Controls
# ═══════════════════════════════════════════
bind = SUPER + ALT, space, spawn, qs -c noctalia-shell ipc call controlCenter toggle
bind = SUPER + ALT, comma, spawn, qs -c noctalia-shell ipc call systemMonitor toggle
bind = SUPER + ALT, s, spawn, qs -c noctalia-shell ipc call settings toggle
bind = SUPER + ALT, n, spawn,spawn, qs -c noctalia-shell ipc call nightLight toggle
bind = SUPER + ALT, d, spawn, qs -c noctalia-shell ipc call notifications toggleDND
bind = SUPER + ALT, h, spawn, qs -c noctalia-shell ipc call notifications toggleHistory
bind = SUPER + ALT, c, spawn, qs -c noctalia-shell ipc call notifications clear
bind = SUPER + ALT, e, spawn, qs -c noctalia-shell ipc call launcher emoji
bind = SUPER + ALT, v, spawn, qs -c noctalia-shell ipc call plugin:clipper toggle
bind = SUPER + ALT, k, spawn, qs -c noctalia-shell ipc call calendar toggle

# ═══════════════════════════════════════════
# Session & Lock
# ═══════════════════════════════════════════
bind = SUPER + ALT, l, spawn, qs -c noctalia-shell ipc call lockScreen lock
bind = SUPER + ALT + CTRL, l, spawn, qs -c noctalia-shell ipc call sessionMenu lockAndSuspend

# ═══════════════════════════════════════════
# Media Keys (Hardware)
# ═══════════════════════════════════════════
bind = NONE, XF86AudioRaiseVolume, spawn, qs -c noctalia-shell ipc call volume increase
bind = NONE, XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bind = NONE, XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bind = NONE, XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bind = NONE, XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease
bind = NONE, XF86AudioPlay,spawn,qs -c noctalia-shell ipc call media playPause
bind = NONE, XF86AudioNext,spawn,qs -c noctalia-shell ipc call media next
bind = NONE, XF86AudioPrev,spawn,qs -c noctalia-shell ipc call media previous

# ═══════════════════════════════════════════
# Window Focus (Super + Arrows)
# ═══════════════════════════════════════════
bind = SUPER, left, focusdir, left
bind = SUPER, right, focusdir, right
bind = SUPER, up, focusdir, up
bind = SUPER, down, focusdir, down

# ═══════════════════════════════════════════
# Window Movement (Super + Shift + Arrows)
# ═══════════════════════════════════════════
bind = SUPER + SHIFT, left, exchange_client, left
bind = SUPER + SHIFT, right, exchange_client, right
bind = SUPER + SHIFT, up, exchange_client, up
bind = SUPER + SHIFT, down, exchange_client, down
bind = SUPER + CTRL, left, viewtoleft, 0
bind = SUPER + CTRL, right, viewtoright, 0

# ═══════════════════════════════════════════
# Window States
# ═══════════════════════════════════════════
bind = SUPER, f, togglefullscreen
bind = SUPER + SHIFT, f, togglemaximizescreen
bind = SUPER + SHIFT, t, togglefloating
bind = SUPER + SHIFT, o, toggleoverview
bind = SUPER + SHIFT, q, spawn, wlogout

# ═══════════════════════════════════════════
# Window Cycling
# ═══════════════════════════════════════════
bind = ALT, Tab, focusstack, next

# ═══════════════════════════════════════════
# Scratchpad
# ═══════════════════════════════════════════
bind = SUPER, s, toggle_scratchpad
bind = SUPER + SHIFT, s , minimized
bind = SUPER + SHIFT + CTRL, s, restore_minimized

# ═══════════════════════════════════════════
# Layout Controls
# ═══════════════════════════════════════════
bind = SUPER + CTRL, l, switch_layout

# ═══════════════════════════════════════════
# Gaps Controls (commented — set key later)
# ═══════════════════════════════════════════
# bind = ALT + SHIFT, X, incgaps,1
# bind = ALT + SHIFT, Z, incgaps,-1
# bind = ALT + SHIFT, R, togglegaps

# ═══════════════════════════════════════════
# Bin Scripts
# ═══════════════════════════════════════════
bind = SUPER + SHIFT, s, spawn, ~/.config/mango/bin/screenshot.sh
# Toggle outer gaps — normal / recording mode (gappoh 10 ↔ 450)
# bind = SUPER + ALT, g, spawn, ~/.config/mango/bin/toggle-outer-gaps.sh

# ═══════════════════════════════════════════
# Workspace Navigation (Super + 1-9)
# ═══════════════════════════════════════════
bind = SUPER, 1, view,1,0
bind = SUPER, 2, view,2,0
bind = SUPER, 3, view,3,0
bind = SUPER, 4, view,4,0
bind = SUPER, 5, view,5,0
bind = SUPER, 6, view,6,0
bind = SUPER, 7, view,7,0
bind = SUPER, 8, view,8,0
bind = SUPER, 9, view,9,0

# ═══════════════════════════════════════════
# Move Window to Workspace (Super + Shift + 1-9)
# ═══════════════════════════════════════════
bind = SUPER + SHIFT, 1, tag,1,0
bind = SUPER + SHIFT, 2, tag,2,0
bind = SUPER + SHIFT, 3, tag,3,0
bind = SUPER + SHIFT, 4, tag,4,0
bind = SUPER + SHIFT, 5, tag,5,0
bind = SUPER + SHIFT, 6, tag,6,0
bind = SUPER + SHIFT, 7, tag,7,0
bind = SUPER + SHIFT, 8, tag,8,0
bind = SUPER + SHIFT, 9, tag,9,0

# ═══════════════════════════════════════════
# Multi-Monitor
# ═══════════════════════════════════════════
bind = SUPER + CTRL + ALT, Tab, focusstack, next
bind = SUPER + CTRL + ALT, left, focusmon, left
bind = SUPER + CTRL + ALT, right, focusmon, right
bind = SUPER + CTRL + ALT, up, focusmon, up
bind = SUPER + CTRL + ALT, down, focusmon, down
bind = SUPER + CTRL + ALT + SHIFT, left, tagmon, left
bind = SUPER + CTRL + ALT + SHIFT, right, tagmon, right
bind = SUPER + CTRL + ALT + SHIFT, up, tagmon, up
bind = SUPER + CTRL + ALT + SHIFT, down, tagmon, down

# ═══════════════════════════════════════════
# Resize Windows
# ═══════════════════════════════════════════
bind = CTRL + ALT, up, resizewin,+0,-50
bind = CTRL + ALT, down, resizewin,+0,+50
bind = CTRL + ALT, left, resizewin,-50,+0
bind = CTRL + ALT, right,resizewin,+50,+0

# ═══════════════════════════════════════════
# Mouse Bindings
# ═══════════════════════════════════════════
mousebind = SUPER, btn_left, moveresize,curmove
mousebind = SUPER, btn_right, moveresize,curresize

# ═══════════════════════════════════════════
# Scroll Bindings
# ═══════════════════════════════════════════
axisbind = SUPER, UP, viewtoleft_have_client
axisbind = SUPER, DOWN, viewtoright_have_client
