# Mango Config - Following creator's structure
# More options: https://github.com/DreamMaoMao/mango/wiki/

# ============================================
# Visual Effects
# ============================================
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=1
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0

border_radius=6
no_radius_when_single=0
focused_opacity=0.95
unfocused_opacity=0.8

# ============================================
# Animation Configuration
# tag_animation_direction: 0=vertical (up/down), 1=horizontal (left/right)
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=0
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=100
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# ============================================
# Layout Settings
# ============================================
# Scroller Layout
scroller_structs=450
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=0
scroller_ignore_proportion_single=0
scroller_default_proportion_single=0.743
scroller_proportion_preset=0.5,0.7,1.0

# Master-Stack Layout
new_is_master=1
default_mfact=0.5
default_nmaster=1
smartgaps=0

# ============================================
# Overview Settings
# ============================================
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
overviewgappi=5
overviewgappo=30

# ============================================
# Miscellaneous
# ============================================
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=0
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
cursor_theme=Bibata-Modern-Ice
drag_tile_to_tile=1

# ============================================
# Keyboard
# ============================================
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# ============================================
# Trackpad
# ============================================
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# ============================================
# Mouse
# ============================================
mouse_natural_scrolling=0

# ============================================
# Appearance
# ============================================
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2
